<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>KAWAII LAB検定 「この歌詞、だれが歌ってる？？」</title>
  <link rel="icon" href="icon.png" type="image/png">
  <link rel="apple-touch-icon" href="icon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<style>
  .subtitle, .description {
    font-size: 0.85rem;
    font-weight: normal !important;
    color: #777;
    line-height: 1.6;
    letter-spacing: 0.04em;
    -webkit-text-stroke: 0; 
    transform: none;
    opacity: 1;
    display: block;
    text-align: center;
  }
  .rules { display: flex; flex-direction: column; align-items: center; margin: 5px 0; }
  .rule-item {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    font-size: clamp(12px, 3.5vw, 16px); 
    color: #555;
    font-weight: bold;
    white-space: nowrap;
  }
  .start-btn { width: 70%; max-width: 220px; background: linear-gradient(45deg, #ff9a9e, #fad0c4, #ffecd2, #a1c4fd, #c2e9fb); background-size: 300% 300%; animation: gradientMove 5s ease infinite; margin-bottom: 15px; }
  @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

  /* ✨ 追加：アンケートボタンのスタイル */
  .survey-btn {
    display: block;
    width: 65%;
    max-width: 200px;
    margin: 10px auto;
    padding: 8px 0;
    font-size: 0.7rem;
    color: #ff69b2;
    background: #fff;
    border: 2px solid #ffb6c1;
    border-radius: 20px;
    cursor: pointer;
    font-weight: bold;
    text-decoration: none;
    transition: background 0.2s;
  }
  .survey-btn:active {
    background: #fff0f5;
    transform: translateY(1px);
  }

  .disclaimer {
    font-size: clamp(10px, 2.5vw, 12px);
    color: #888;
    line-height: 1.5;
    margin-top: 20px;
    white-space: nowrap;
    text-align: center;
  }

  .title-sub {
    display: block;
    font-family: "Mochiy Pop One", sans-serif;
    font-size: 2.0rem;
    line-height: 1.5;
    margin-top: 10px;
    transform: rotate(-2deg);
  }

  .list-btn {
    display: block;
    width: 65%;
    max-width: 200px;
    margin: 8px auto;
    padding: 8px 0;
    font-size: 0.7rem;
    color: #887a70; /* 落ち着いた色 */
    background: #fdfaf2;
    border: 1px solid #dcd5c5;
    border-radius: 20px;
    cursor: pointer;
    font-weight: bold;
    text-decoration: none;
    transition: all 0.2s;
  }
  .list-btn:active {
    background: #f5f0e1;
    transform: translateY(1px);
  }
</style>

<body class="locked">

  <div class="box">
    <h1 class="title">
      <img src="logo.png" alt="KAWAII LAB検定" class="site-logo">
      <span class="title-sub">
        <span>こ</span><span>の</span><span>歌</span><span>詞</span><br>
        <span>だ</span><span>れ</span><span>が</span><span>う</span><span>た</span><span>っ</span><span>て</span><span>る</span><span>？</span><span>？</span>
      </span>
    </h1>

    <div class="description">
      <p class="desc-text">歌詞の一部を見て、<br class="mobile-only">誰のパートか当てるクイズです。</p>
      <div class="rules">
        <div class="rule-item"><span>✨</span><span>正解数で理解度を測定！</span><span>✨</span></div>
        <div class="rule-item"><span>✨</span><span>たくさん正解して推しへの愛を証明しよう！</span><span>✨</span></div>
      </div>
    </div>

    <button class="start-btn" onclick="startQuiz()">検定開始！</button>

    <a href="https://forms.gle/EguRX6uWZYmJJLZx5" target="_blank" class="survey-btn">
      💬 アンケートにご協力ください
    </a>

    <a href="lyrics.html" class="list-btn">
      🎵 収録楽曲リスト
    </a>

    <p class="disclaimer">
      歌割りはKAWAII LAB公式歌割り画像を参考にしています。<br>
      歌割り画像が存在しない歌は、ファンブログやライブ映像を参考にしています。
    </p>
  </div>

  <script>
    function startQuiz() {
      const quizState = {
        group: null,
        difficulty: null,
        currentIndex: 0,
        correctCount: 0,
        quizIds: []
      };
      localStorage.setItem("quizState", JSON.stringify(quizState));
      location.href = "group.html";
    }
  </script>

</body>
</html>
