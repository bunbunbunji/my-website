<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>収録楽曲リスト - 歌割り検定</title>
  <link rel="icon" href="icon.png" type="image/png">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* リスト全体のコンテナ */
    .list-container { 
      text-align: left; 
      max-height: 70vh; 
      overflow-y: auto; 
      padding: 10px;
      background: rgba(255, 255, 255, 0.6);
      border-radius: 15px;
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
    }

    .group-section { margin-bottom: 25px; }

    .group-name { 
      font-family: "Mochiy Pop One", sans-serif; 
      color: #ff69b2; 
      font-size: 1.1rem; 
      border-bottom: 2px solid #ffb6c1; 
      margin-bottom: 10px; 
      padding-bottom: 4px; 
    }
    
    /* 実装済みの曲（標準：黒文字） */
    .song-item { 
      display: flex; 
      justify-content: space-between; 
      align-items: center;
      padding: 8px 0; 
      border-bottom: 1px solid #eee; 
      font-size: 0.9rem;
      color: #333; /* はっきりした黒 */
      font-weight: bold;
    }

    /* 未実装の曲（灰色） */
    .song-unreleased { 
      color: #bbb !important; 
      font-weight: normal !important;
    }

    .song-info { display: flex; align-items: center; gap: 8px; }

    /* やさしいバッジ */
    .easy-badge { 
      font-size: 0.6rem; 
      background: #4ecdc4; 
      color: white; 
      padding: 2px 6px; 
      border-radius: 10px; 
      font-weight: bold;
      white-space: nowrap;
    }

    .status-tag { 
      font-size: 0.6rem; 
      color: #ccc; 
      font-weight: normal;
    }

    .loading-text {
      text-align: center;
      font-size: 0.8rem;
      color: #ff69b2;
      margin: 20px 0;
      font-weight: bold;
    }

    .back-btn {
      background: #ccc !important;
      margin-top: 15px;
      width: 100%;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 25px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body class="locked">

  <div class="box" style="max-width: 450px;">
    <h2 class="title" style="font-size: 1.5rem;">収録楽曲リスト</h2>
    
    <div id="loading" class="loading-text">楽曲データを取得中...</div>
    
    <div id="list-content" class="list-container">
      </div>

    <button class="back-btn" onclick="location.href='index.html'">戻る</button>
  </div>

  <script>
  (function() {
    const URL = 'https://atinpqtedmrfrtdlkpkd.supabase.co';
    const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF0aW5wcXRlZG1yZnJ0ZGxrcGtkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkwOTU0NjcsImV4cCI6MjA4NDY3MTQ2N30.Oor6oUuuIxa0pSxIRuwEw7ZzGYM4hOGfywHqv2FaBHg'; 
    const db = window.supabase.createClient(URL, KEY);

    const groups = [
      { id: 'fz', name: 'FRUITS ZIPPER', table: 'fz_sounds' },
      { id: 'cd', name: 'CANDY TUNE', table: 'cd_sounds' },
      { id: 'ss', name: 'SWEET STEADY', table: 'ss_sounds' },
      { id: 'cs', name: 'CUTIE STREET', table: 'cs_sounds' }
    ];

    function superNormalize(str) {
      if (!str) return "";
      return str
        .replace(/[！-～]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0))
        .replace(/[^a-zA-Z0-9ぁ-んァ-ヶー一-龠]/g, "")
        .toLowerCase()
        .trim();
    }

    async function fetchAllData() {
      const container = document.getElementById('list-content');
      try {
        // --- 全件取得ロジック (1000件以上の壁を突破) ---
        let allQuizTitles = [];
        let from = 0;
        let to = 999;
        let hasMore = true;

        while (hasMore) {
          const { data, error } = await db
            .from('quizzes')
            .select('song_title')
            .range(from, to);

          if (error) throw error;
          if (data.length === 0) {
            hasMore = false;
          } else {
            allQuizTitles = allQuizTitles.concat(data);
            from += 1000;
            to += 1000;
            // 取得データが1000件未満ならこれ以上データはないと判断
            if (data.length < 1000) hasMore = false;
          }
        }

        const activeSongsSet = new Set(allQuizTitles.map(q => superNormalize(q.song_title)));
        
        console.log("最終的に取得したユニークな曲数:", activeSongsSet.size);

        for (const group of groups) {
          const { data: songs, error } = await db
            .from(group.table)
            .select('song_title, easy_flag')
            .order('song_title', { ascending: true });

          if (error) continue;

          const section = document.createElement('div');
          section.className = 'group-section';
          section.innerHTML = `<div class="group-name">${group.name}</div>`;
          const list = document.createElement('div');
          
          songs.forEach(song => {
            const rawTitle = song.song_title || "";
            const hasQuiz = activeSongsSet.has(superNormalize(rawTitle));

            const itemClass = hasQuiz ? 'song-item' : 'song-item song-unreleased';
            const easyTag = song.easy_flag === 1 ? '<span class="easy-badge">やさしい対象</span>' : '';
            const statusText = hasQuiz ? '' : '<span class="status-tag">準備中</span>';

            list.innerHTML += `
              <div class="${itemClass}">
                <div class="song-info"><span>♪ ${rawTitle}</span></div>
                <div style="display:flex; align-items:center; gap:5px;">
                  ${easyTag}${statusText}
                </div>
              </div>`;
          });
          section.appendChild(list);
          container.appendChild(section);
        }
        document.getElementById('loading').style.display = 'none';
      } catch (err) {
        console.error("Error:", err);
      }
    }
    window.addEventListener('load', fetchAllData);
  })();
</script>

</body>
</html>
